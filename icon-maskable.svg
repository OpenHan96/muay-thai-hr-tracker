<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161a22"/>
      <stop offset="1" stop-color="#0d0f14"/>
    </linearGradient>
    <linearGradient id="glove" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff4d5a"/>
      <stop offset="1" stop-color="#e63946"/>
    </linearGradient>
  </defs>

  <!-- full-bleed background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Art scaled to ~78% and centered so it stays inside the maskable safe zone -->
  <g transform="translate(256,256) scale(0.78) translate(-256,-262)">
    <g transform="translate(256,262)">
      <path d="M -96 -40
               a 96 96 0 0 1 96 -96
               a 96 96 0 0 1 96 96
               l 0 60
               a 70 70 0 0 1 -70 70
               l -52 0
               a 70 70 0 0 1 -70 -70
               z"
            fill="url(#glove)"/>
      <path d="M -96 -18
               a 40 40 0 0 0 -40 40
               a 40 40 0 0 0 40 40
               l 8 0
               z"
            fill="url(#glove)"/>
      <rect x="-70" y="78" width="140" height="44" rx="16" fill="#b32430"/>
      <path d="M -78 -6 q 78 34 156 0" stroke="#b32430" stroke-width="10" fill="none" stroke-linecap="round"/>
    </g>
    <path d="M 86 268
             L 168 268
             L 196 214
             L 232 322
             L 268 250
             L 292 268
             L 426 268"
          fill="none" stroke="#e8ebf2" stroke-width="14"
          stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  </g>
</svg>
