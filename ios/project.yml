# XcodeGen spec — source of truth for the Xcode project.
# If FightHR.xcodeproj won't open or you change files, install XcodeGen
# (brew install xcodegen) and run `xcodegen generate` in this folder.
name: FightHR
options:
  bundleIdPrefix: com.fighthr
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""          # set your Apple Developer Team ID here or in Xcode
    CODE_SIGN_STYLE: Automatic
targets:
  FightHR:
    type: application
    platform: iOS
    sources:
      - path: FightHR/Sources
      - path: FightHR/Assets.xcassets
    info:
      path: FightHR/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fighthr.app
        PRODUCT_NAME: FightHR
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
